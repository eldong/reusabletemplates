####################################################################
# Demo 3 — Consumer: calls the org-level reusable workflow
# In a real org this would be: uses: my-org/.github/.github/workflows/node-ci.yml@main
# Here we simulate locally.
####################################################################
name: "Demo 3: CI (org consumer)"

on:
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/demo3-reusable-ci.yml
    with:
      node-version: "20"
      enable-coverage: true
